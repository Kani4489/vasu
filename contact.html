<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Vasu Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <main class="container py-5" style="margin-top: 100px;">
        <div class="text-center mb-5 scroll-animate">
            <h1 class="display-4 mb-2">Contact Us</h1>
            <p class="text-muted">Reach out to enquire about customized cakes, corporate orders or local deliveries</p>
        </div>

        <div class="row g-5">
            <!-- Left Side - Form -->
            <div class="col-lg-6 scroll-animate">
                <div class="card border-light-brown p-4 rounded-4 shadow-sm bg-white">
                    <h3 class="mb-4 text-chocolate border-bottom pb-2">Drop Us a Message</h3>
                    
                    <form id="contact-form" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="contact-name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="contact-name" required placeholder="Your Name">
                            <div class="invalid-feedback">Please enter your name.</div>
                        </div>

                        <div class="mb-3">
                            <label for="contact-subject" class="form-label">Subject *</label>
                            <input type="text" class="form-control" id="contact-subject" required placeholder="What's this about? e.g. Wedding Cake booking">
                            <div class="invalid-feedback">Please enter a subject.</div>
                        </div>

                        <div class="mb-4">
                            <label for="contact-message" class="form-label">Message details *</label>
                            <textarea class="form-control" id="contact-message" rows="5" required placeholder="Write your requirements, dates, quantities..."></textarea>
                            <div class="invalid-feedback">Please write details of your message.</div>
                        </div>

                        <button type="submit" class="btn btn-bakery w-100 py-3"><i class="bi bi-whatsapp me-2"></i>Send Message via WhatsApp</button>
                    </form>
                </div>
            </div>

            <!-- Right Side - Address details & Map -->
            <div class="col-lg-6 scroll-animate">
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="d-flex align-items-start">
                            <i class="bi bi-geo-alt-fill text-chocolate fs-3 me-3"></i>
                            <div>
                                <h5 class="mb-1 text-chocolate">Bakery Store</h5>
                                <p class="text-muted small mb-0" id="contact-address-text">Shop 12, Gold Crest Building, Mumbai</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex align-items-start">
                            <i class="bi bi-telephone-fill text-chocolate fs-3 me-3"></i>
                            <div>
                                <h5 class="mb-1 text-chocolate">Phone & Chat</h5>
                                <p class="text-muted small mb-0" id="contact-phone-text">+91 98765 43210</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Google Maps Frame -->
                <div class="card border-light-brown overflow-hidden rounded-4 shadow-sm" style="height: 330px;">
                    <iframe id="contact-gmaps-iframe" src="" class="w-100 h-100 border-0" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';
        window.CONFIG = CONFIG;
    </script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Apply configs
            document.getElementById('contact-address-text').textContent = CONFIG.address;
            document.getElementById('contact-phone-text').textContent = CONFIG.contactPhone;
            document.getElementById('contact-gmaps-iframe').src = CONFIG.googleMapsEmbed;

            // Auto fill subject parameter if available in URL query
            const urlParams = new URLSearchParams(window.location.search);
            const querySubject = urlParams.get('subject');
            if (querySubject) {
                document.getElementById('contact-subject').value = decodeURIComponent(querySubject);
            }

            const form = document.getElementById('contact-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!form.checkValidity()) {
                    e.stopPropagation();
                    form.classList.add('was-validated');
                    return;
                }

                const name = document.getElementById('contact-name').value;
                const subject = document.getElementById('contact-subject').value;
                const message = document.getElementById('contact-message').value;

                let waMsg = `*INQUIRY - ${CONFIG.bakeryName}*\n`;
                waMsg += `*From:* ${name}\n`;
                waMsg += `*Subject:* ${subject}\n`;
                waMsg += `-----------------------------\n`;
                waMsg += `${message}`;

                const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(waMsg)}`;
                window.open(url, '_blank');
            });
        });
    </script>
</body>
</html>
