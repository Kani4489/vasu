<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Vasu Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .thumbnail-img {
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition-smooth);
        }
        .thumbnail-img:hover, .thumbnail-img.active {
            border-color: var(--color-chocolate);
        }
    </style>
</head>
<body>

    <main class="container py-5" style="margin-top: 100px;">
        <div id="product-detail-loader" class="text-center py-5">
            <div class="spinner-border text-chocolate" role="status">
                <span class="visually-hidden">Loading Product Details...</span>
            </div>
        </div>

        <div id="product-detail-content" class="row g-5 d-none">
            <!-- Left Side - Image Gallery -->
            <div class="col-md-6">
                <div class="card border-0 bg-transparent scroll-animate">
                    <img id="main-product-img" src="" class="img-fluid rounded-4 shadow-sm w-100" style="max-height: 450px; object-fit: cover;" alt="Product Main Image">
                    <div id="thumbnail-strip" class="d-flex gap-2 mt-3">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Right Side - Product Information -->
            <div class="col-md-6 scroll-animate">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="products.html" class="text-chocolate">Products</a></li>
                        <li class="breadcrumb-item active" id="breadcrumb-category">Category</li>
                    </ol>
                </nav>
                
                <h1 id="product-name" class="display-5 mb-2">Product Name</h1>
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="text-warning small" id="rating-stars">
                        <!-- Stars icons -->
                    </div>
                    <span class="text-muted small" id="review-count">(0 Reviews)</span>
                </div>

                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-2 fw-bold text-chocolate" id="product-price">₹0</span>
                    <span class="text-decoration-line-through text-muted fs-4 d-none" id="product-original-price">₹0</span>
                </div>

                <p id="product-description" class="lead text-muted mb-4">Product full description text goes here.</p>
                
                <div class="card p-3 mb-4 border-light-brown rounded-3 bg-cream">
                    <div class="row g-3">
                        <div class="col-6">
                            <span class="text-muted small d-block">Weight/Qty</span>
                            <strong id="product-weight">N/A</strong>
                        </div>
                        <div class="col-6">
                            <span class="text-muted small d-block">Servings</span>
                            <strong id="product-servings">N/A</strong>
                        </div>
                        <div class="col-12 border-top pt-2 mt-2">
                            <span class="text-muted small d-block">Ingredients</span>
                            <strong id="product-ingredients" class="fw-normal">Flour, Butter, Sugar, Yeast</strong>
                        </div>
                    </div>
                </div>

                <!-- Quantity & Actions -->
                <div class="d-flex align-items-center gap-3 mb-5">
                    <div class="input-group" style="width: 130px;">
                        <button class="btn btn-outline-secondary border-light-brown" type="button" id="qty-minus"><i class="bi bi-dash"></i></button>
                        <input type="text" class="form-control text-center border-light-brown" id="qty-input" value="1" readonly>
                        <button class="btn btn-outline-secondary border-light-brown" type="button" id="qty-plus"><i class="bi bi-plus"></i></button>
                    </div>
                    <button class="btn btn-bakery flex-grow-1" id="add-to-cart-btn"><i class="bi bi-cart3 me-2"></i>Add to Cart</button>
                    <button class="btn btn-bakery-pink flex-grow-1 text-white" id="buy-now-btn">Buy Now</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';
        window.CONFIG = CONFIG;
    </script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import { loadProducts } from './js/products.js';
        import { addToCart } from './js/cart.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                window.location.href = 'products.html';
                return;
            }

            const data = await loadProducts();
            const product = data.products.find(p => p.id === productId);

            if (!product) {
                document.getElementById('product-detail-loader').innerHTML = `
                <div class="alert alert-danger">Product not found. <a href="products.html">Go back to Products</a></div>`;
                return;
            }

            // Hide loader & show details
            document.getElementById('product-detail-loader').classList.add('d-none');
            document.getElementById('product-detail-content').classList.remove('d-none');

            // Populate UI Elements
            document.getElementById('breadcrumb-category').textContent = product.category;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-price').textContent = `₹${product.price}`;
            
            if (product.originalPrice) {
                const origPriceEl = document.getElementById('product-original-price');
                origPriceEl.textContent = `₹${product.originalPrice}`;
                origPriceEl.classList.remove('d-none');
            }

            document.getElementById('product-description').textContent = product.description;
            document.getElementById('product-weight').textContent = product.weight || 'N/A';
            document.getElementById('product-servings').textContent = product.servings || 'N/A';
            document.getElementById('product-ingredients').textContent = product.ingredients || 'N/A';
            document.getElementById('review-count').textContent = `(${product.reviews || 0} Reviews)`;

            // Rating Stars
            const starsContainer = document.getElementById('rating-stars');
            starsContainer.innerHTML = '';
            const rating = product.rating || 5;
            for(let i=1; i<=5; i++) {
                if (i <= Math.floor(rating)) {
                    starsContainer.innerHTML += '<i class="bi bi-star-fill text-warning"></i>';
                } else if (i - 0.5 <= rating) {
                    starsContainer.innerHTML += '<i class="bi bi-star-half text-warning"></i>';
                } else {
                    starsContainer.innerHTML += '<i class="bi bi-star text-warning"></i>';
                }
            }

            // Image Gallery Setup
            const mainImg = document.getElementById('main-product-img');
            mainImg.src = product.images[0];
            mainImg.alt = product.name;

            const thumbsContainer = document.getElementById('thumbnail-strip');
            thumbsContainer.innerHTML = '';
            
            // Loop images
            product.images.forEach((imgSrc, idx) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = `thumbnail-img img-fluid rounded-3 ${idx === 0 ? 'active' : ''}`;
                img.style = "width: 80px; height: 80px; object-fit: cover;";
                img.alt = `${product.name} gallery image ${idx+1}`;
                img.onerror = () => img.src = 'https://placehold.co/80/E4D0D0/5C3E35?text=Cake';
                
                img.addEventListener('click', () => {
                    document.querySelectorAll('.thumbnail-img').forEach(t => t.classList.remove('active'));
                    img.classList.add('active');
                    mainImg.src = imgSrc;
                });
                
                thumbsContainer.appendChild(img);
            });

            // Quantity selector controls
            const qtyInput = document.getElementById('qty-input');
            document.getElementById('qty-minus').addEventListener('click', () => {
                let current = parseInt(qtyInput.value) || 1;
                if (current > 1) {
                    qtyInput.value = current - 1;
                }
            });
            document.getElementById('qty-plus').addEventListener('click', () => {
                let current = parseInt(qtyInput.value) || 1;
                qtyInput.value = current + 1;
            });

            // Cart actions
            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                const qty = parseInt(qtyInput.value) || 1;
                addToCart(product, qty);
            });

            document.getElementById('buy-now-btn').addEventListener('click', () => {
                const qty = parseInt(qtyInput.value) || 1;
                addToCart(product, qty);
                window.location.href = 'cart.html';
            });
        });
    </script>
</body>
</html>
