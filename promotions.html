<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Promotions - Vasu Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .coupon-card {
            border: 2px dashed var(--color-accent-pink);
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            transition: var(--transition-smooth);
        }
        .coupon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .coupon-code {
            background-color: var(--color-soft-pink);
            color: var(--color-chocolate-dark);
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.1rem;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            cursor: pointer;
        }
        .countdown-timer {
            font-family: monospace;
            font-weight: bold;
            color: var(--color-chocolate);
        }
    </style>
</head>
<body>

    <main class="container py-5" style="margin-top: 100px;">
        <div class="text-center mb-5 scroll-animate">
            <h1 class="display-4 mb-2">Promotions & Coupons</h1>
            <p class="text-muted">Save more on our fresh bakery delights with active coupons and combo packs</p>
        </div>

        <!-- Limited Time Offers Section -->
        <section class="mb-5">
            <h2 class="display-6 border-bottom pb-2 mb-4 scroll-animate"><i class="bi bi-clock-history me-2 text-danger"></i>Limited-Time Offers</h2>
            <div class="row g-4" id="ltd-offers-container">
                <div class="col-12 text-center py-4">
                    <div class="spinner-border text-chocolate" role="status">
                        <span class="visually-hidden">Loading offers...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Coupon Codes Section -->
        <section class="mb-5">
            <h2 class="display-6 border-bottom pb-2 mb-4 scroll-animate"><i class="bi bi-ticket-perforated me-2 text-success"></i>Available Coupon Codes</h2>
            <div class="row g-4" id="coupons-container">
                <!-- Loaded Dynamically -->
            </div>
        </section>

        <!-- Combo Packs Section -->
        <section class="mb-5">
            <h2 class="display-6 border-bottom pb-2 mb-4 scroll-animate"><i class="bi bi-gift me-2 text-primary"></i>Specially Curated Combo Offers</h2>
            <div class="row g-4" id="combos-container">
                <!-- Loaded Dynamically -->
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';
        window.CONFIG = CONFIG;
    </script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import { loadPromotions } from './js/promotions.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const data = await loadPromotions();
            
            renderLimitedTimeOffers(data.limitedOffers);
            renderCoupons(data.coupons);
            renderCombos(data.comboOffers);
        });

        function renderLimitedTimeOffers(offers) {
            const container = document.getElementById('ltd-offers-container');
            container.innerHTML = '';
            
            const activeOffers = offers.filter(o => o.isActive);
            if (activeOffers.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted py-3">No active limited-time offers currently. Check back soon!</div>';
                return;
            }

            activeOffers.forEach((offer, idx) => {
                const timerId = `timer-${offer.id}`;
                const html = `
                <div class="col-md-6 scroll-animate">
                    <div class="card bg-cream border-0 p-4 rounded-4 shadow-sm h-100 position-relative">
                        <span class="badge bg-danger position-absolute top-0 start-0 m-3">${offer.badge}</span>
                        <div class="pt-3">
                            <h4>${offer.title}</h4>
                            <p class="text-muted">${offer.description}</p>
                            <div class="d-flex align-items-center gap-2 mt-4 bg-white p-3 rounded-3 shadow-2xs">
                                <i class="bi bi-hourglass-split text-chocolate fs-4"></i>
                                <div>
                                    <span class="text-muted small d-block">Offer expires in:</span>
                                    <span class="countdown-timer fs-5" id="${timerId}">Calculated...</span>
                                </div>
                            </div>
                            <div class="mt-4">
                                <a href="products.html" class="btn btn-bakery btn-sm">Shop Pastries Now</a>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
                
                // Start Countdown Timer
                setupCountdown(offer.expiresAt, timerId);
            });
        }

        function setupCountdown(expiresAt, elementId) {
            const expiryTime = new Date(expiresAt).getTime();
            
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const distance = expiryTime - now;
                const el = document.getElementById(elementId);
                
                if (!el) {
                    clearInterval(timer);
                    return;
                }
                
                if (distance < 0) {
                    clearInterval(timer);
                    el.textContent = "EXPIRED";
                    el.classList.add('text-danger');
                    return;
                }
                
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                el.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        function renderCoupons(coupons) {
            const container = document.getElementById('coupons-container');
            container.innerHTML = '';
            
            const active = coupons.filter(c => c.isActive);
            active.forEach(c => {
                const html = `
                <div class="col-md-6 col-lg-4 scroll-animate">
                    <div class="card coupon-card p-4 h-100 text-center">
                        <h4 class="text-chocolate">${c.description}</h4>
                        <p class="text-muted small mb-4">Minimum Order: ₹${c.minOrder} | Expires: ${c.validUntil}</p>
                        <div class="mb-3">
                            <div class="coupon-code border px-3 py-2" onclick="navigator.clipboard.writeText('${c.code}'); alert('Coupon code ${c.code} copied to clipboard!')">
                                <i class="bi bi-files me-2 text-muted"></i>${c.code}
                            </div>
                        </div>
                        <span class="text-muted small">Click to copy code</span>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderCombos(combos) {
            const container = document.getElementById('combos-container');
            container.innerHTML = '';
            
            const active = combos.filter(c => c.isActive);
            active.forEach(combo => {
                const html = `
                <div class="col-lg-4 col-md-6 scroll-animate">
                    <div class="card card-bakery h-100">
                        <div class="position-relative">
                            <img src="${combo.image}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="${combo.title}" onerror="this.src='https://placehold.co/300x200/E4D0D0/5C3E35?text=Combo'">
                            <span class="badge position-absolute top-0 start-0 m-3 px-3 py-2 bg-success text-white">${combo.badge}</span>
                        </div>
                        <div class="card-body d-flex flex-column text-center">
                            <h4 class="card-title">${combo.title}</h4>
                            <p class="card-text text-muted small">${combo.description}</p>
                            <div class="mt-auto">
                                <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
                                    <span class="fs-4 fw-bold text-chocolate">₹${combo.offerPrice}</span>
                                    <span class="text-decoration-line-through text-muted small">₹${combo.originalPrice}</span>
                                </div>
                                <a href="contact.html?subject=Inquiry regarding Combo Package: ${encodeURIComponent(combo.title)}" class="btn btn-bakery btn-sm rounded-pill w-100">Order Combo via Inquiry</a>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }
    </script>
</body>
</html>
