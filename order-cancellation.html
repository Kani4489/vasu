<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Order - Vasu Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <main class="container py-5" style="margin-top: 100px;">
        <div class="row justify-content-center">
            <div class="col-lg-6 scroll-animate">
                <div class="card border-light-brown p-4 rounded-4 shadow-sm bg-white">
                    <div class="text-center mb-4">
                        <i class="bi bi-x-circle text-danger fs-1"></i>
                        <h2 class="display-6 text-chocolate mt-2">Request Order Cancellation</h2>
                        <p class="text-muted small">Please submit your request below. Cancellation requests will be processed over WhatsApp by the bakery administrators.</p>
                    </div>

                    <form id="cancellation-form" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="cancel-order-num" class="form-label">Order Number *</label>
                            <input type="text" class="form-control" id="cancel-order-num" required placeholder="e.g. VB123456">
                            <div class="invalid-feedback">Please enter your order number.</div>
                        </div>

                        <div class="mb-3">
                            <label for="cancel-phone" class="form-label">Registered Mobile Number *</label>
                            <input type="tel" class="form-control" id="cancel-phone" required placeholder="Enter mobile number">
                            <div class="invalid-feedback">Please enter your registered mobile number.</div>
                        </div>

                        <div class="mb-3">
                            <label for="cancel-reason" class="form-label">Reason for Cancellation *</label>
                            <select class="form-select" id="cancel-reason" required>
                                <option value="" selected disabled>Select a reason...</option>
                                <option value="Ordered wrong product/flavor">Ordered wrong product/flavor</option>
                                <option value="Change of plans/celebration postponed">Change of plans/celebration postponed</option>
                                <option value="Delivery address incorrect">Delivery address incorrect</option>
                                <option value="Found better alternative">Found better alternative</option>
                                <option value="Other">Other (specify below)</option>
                            </select>
                            <div class="invalid-feedback">Please select a reason.</div>
                        </div>

                        <div class="mb-4">
                            <label for="cancel-notes" class="form-label">Additional Comments / Remarks</label>
                            <textarea class="form-control" id="cancel-notes" rows="3" placeholder="Provide any details..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 py-3"><i class="bi bi-whatsapp me-2"></i>Send Request on WhatsApp</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';
        window.CONFIG = CONFIG;
    </script>
    <script type="module" src="js/main.js"></script>
    <script type="module">
        import CONFIG from './js/config.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cancellation-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!form.checkValidity()) {
                    e.stopPropagation();
                    form.classList.add('was-validated');
                    return;
                }

                const orderNum = document.getElementById('cancel-order-num').value;
                const phone = document.getElementById('cancel-phone').value;
                const reason = document.getElementById('cancel-reason').value;
                const notes = document.getElementById('cancel-notes').value;

                let cancelMsg = `*ORDER CANCELLATION REQUEST - ${CONFIG.bakeryName}*\n`;
                cancelMsg += `*Order ID:* #${orderNum}\n`;
                cancelMsg += `*Mobile Phone:* ${phone}\n`;
                cancelMsg += `*Reason:* ${reason}\n`;
                if (notes) {
                    cancelMsg += `*Remarks:* ${notes}\n`;
                }
                cancelMsg += `-----------------------------\n`;
                cancelMsg += `Please verify and confirm the cancellation of this order at your earliest convenience.`;

                const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(cancelMsg)}`;
                window.open(url, '_blank');
            });
        });
    </script>
</body>
</html>
